<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZenPOS — Management System</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f6f8;
  --bg-card: #ffffff;
  --bg-sidebar: #fafbfc;
  --bg-input: #f0f1f4;
  --bg-hover: #f0f1f4;
  --border: #e2e4e9;
  --border-light: #ecedf0;
  --text-primary: #1a1a2e;
  --text-secondary: #5f6578;
  --text-muted: #9a9cae;
  --text-label: #7c7e8f;
  --accent: #2563eb;
  --accent-light: rgba(37,99,235,0.08);
  --accent-border: rgba(37,99,235,0.2);
  --accent2: #e11d48;
  --accent2-light: rgba(225,29,72,0.08);
  --accent2-border: rgba(225,29,72,0.2);
  --green: #16a34a;
  --green-light: rgba(22,163,74,0.08);
  --orange: #ea580c;
  --orange-light: rgba(234,88,12,0.08);
  --red: #dc2626;
  --red-light: rgba(220,38,38,0.08);
  --yellow: #ca8a04;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
  --radius: 8px;
  --radius-lg: 12px;
}

[data-theme="dark"] {
  --bg-primary: #0f1117;
  --bg-secondary: #161821;
  --bg-card: #1a1c27;
  --bg-sidebar: #13141d;
  --bg-input: #1e2030;
  --bg-hover: #1e2030;
  --border: #2a2c3d;
  --border-light: #222433;
  --text-primary: #e8e9ed;
  --text-secondary: #a0a2b3;
  --text-muted: #6b6d7e;
  --text-label: #8a8c9e;
  --accent: #3b82f6;
  --accent-light: rgba(59,130,246,0.1);
  --accent-border: rgba(59,130,246,0.25);
  --accent2: #f43f5e;
  --accent2-light: rgba(244,63,94,0.1);
  --accent2-border: rgba(244,63,94,0.25);
  --green: #22c55e;
  --green-light: rgba(34,197,94,0.1);
  --orange: #f97316;
  --orange-light: rgba(249,115,22,0.1);
  --red: #ef4444;
  --red-light: rgba(239,68,68,0.1);
  --yellow: #eab308;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Plus Jakarta Sans',system-ui,sans-serif; background:var(--bg-primary); color:var(--text-primary); font-size:13px; overflow:hidden; height:100vh; }
button { font-family:inherit; cursor:pointer; }
input,select,textarea { font-family:inherit; }

.app { display:flex; height:100vh; }

/* ── Sidebar ── */
.sidebar {
  width:230px; background:var(--bg-sidebar); border-right:1px solid var(--border);
  display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto;
}
.sidebar-brand { padding:16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.sidebar-brand-icon { width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.sidebar-brand-text h3 { font-size:14px; font-weight:700; color:var(--text-primary); line-height:1.2; }
.sidebar-brand-text span { font-size:10px; color:var(--text-muted); }

.sidebar-section { padding:12px 10px; }
.sidebar-section-title { font-size:10px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; padding:0 6px; margin-bottom:6px; }
.sidebar-item {
  padding:8px 10px; border-radius:var(--radius); display:flex; align-items:center; gap:9px;
  cursor:pointer; font-size:12px; color:var(--text-secondary); font-weight:500;
  margin-bottom:1px; transition: background 0.15s, color 0.15s; border:1px solid transparent;
}
.sidebar-item:hover { background:var(--bg-hover); color:var(--text-primary); }
.sidebar-item.active { background:var(--accent-light); color:var(--accent); border-color:var(--accent-border); font-weight:600; }
.sidebar-item.active-full { background:var(--accent2-light); color:var(--accent2); border-color:var(--accent2-border); font-weight:600; }
.sidebar-item .icon { width:18px; text-align:center; font-size:14px; }

.branch-item { padding:7px 10px; border-radius:var(--radius); cursor:pointer; margin-bottom:2px; border:1px solid transparent; }
.branch-item:hover { background:var(--bg-hover); }
.branch-item.active { background:var(--accent-light); border-color:var(--accent-border); }
.branch-item.active-full { background:var(--accent2-light); border-color:var(--accent2-border); }
.branch-name { font-size:12px; font-weight:600; color:var(--text-primary); }
.branch-meta { font-size:10px; color:var(--text-muted); margin-top:1px; }
.branch-dot { width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:6px; }
.branch-dot.open { background:var(--green); }
.branch-dot.closed { background:var(--red); }

.sidebar-footer { padding:12px 10px; border-top:1px solid var(--border); margin-top:auto; }
.mode-badge {
  font-size:10px; padding:5px 10px; border-radius:20px; font-weight:700; text-align:center;
  letter-spacing:0.5px;
}

/* ── Main ── */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar {
  height:50px; border-bottom:1px solid var(--border); display:flex; align-items:center;
  justify-content:space-between; padding:0 20px; background:var(--bg-card); flex-shrink:0;
}
.topbar-left { display:flex; align-items:center; gap:12px; }
.topbar-left h2 { font-size:15px; font-weight:700; }
.topbar-left .badge { font-size:10px; padding:2px 8px; border-radius:10px; font-weight:600; }
.topbar-right { display:flex; align-items:center; gap:12px; }
.topbar-btn {
  padding:6px 12px; border-radius:var(--radius); border:1px solid var(--border);
  background:var(--bg-card); color:var(--text-secondary); font-size:11px; font-weight:500;
  display:flex; align-items:center; gap:5px; transition:0.15s;
}
.topbar-btn:hover { background:var(--bg-hover); color:var(--text-primary); }
.topbar-btn.danger { border-color:var(--red); color:var(--red); }
.topbar-btn.danger:hover { background:var(--red-light); }

.content { flex:1; overflow-y:auto; padding:20px; background:var(--bg-secondary); }

/* ── Cards & Grids ── */
.card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; box-shadow:var(--shadow-sm); }
.stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
.stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px; box-shadow:var(--shadow-sm); }
.stat-label { font-size:10px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
.stat-value { font-size:22px; font-weight:800; font-variant-numeric:tabular-nums; }

.section-title { font-size:10px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:10px; }

/* ── Workers Grid ── */
.worker-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.worker-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:14px; cursor:pointer; transition:0.15s; position:relative; overflow:hidden;
}
.worker-card:hover { box-shadow:var(--shadow-md); transform:translateY(-1px); }
.worker-card.selected { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-border); }
.worker-card.selected-full { border-color:var(--accent2); box-shadow:0 0 0 2px var(--accent2-border); }
.worker-avatar {
  width:48px; height:48px; border-radius:50%; object-fit:cover;
  background:var(--bg-input); display:flex; align-items:center; justify-content:center;
  font-size:22px; margin:0 auto 8px; overflow:hidden;
}
.worker-avatar img { width:100%; height:100%; object-fit:cover; }

/* ── Status Badges ── */
.status-badge { font-size:10px; padding:3px 8px; border-radius:10px; font-weight:600; display:inline-block; }
.status-available { background:var(--green-light); color:var(--green); }
.status-busy { background:var(--orange-light); color:var(--orange); }
.status-off { background:var(--bg-input); color:var(--text-muted); }

/* ── Room Cards ── */
.room-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.room-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:16px; position:relative; overflow:hidden; min-height:130px;
}
.room-card .progress-bar { position:absolute; bottom:0; left:0; height:3px; transition:width 1s linear; border-radius:0 2px 0 0; }

/* ── Table ── */
.data-table { width:100%; border-collapse:collapse; }
.data-table th { padding:10px 14px; font-size:10px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; text-align:left; border-bottom:1px solid var(--border); background:var(--bg-secondary); }
.data-table td { padding:10px 14px; font-size:12px; border-bottom:1px solid var(--border-light); }

/* ── Service Card ── */
.service-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
.service-card {
  padding:12px 14px; border-radius:var(--radius); border:1px solid var(--border);
  background:var(--bg-card); cursor:pointer; display:flex; justify-content:space-between;
  align-items:center; transition:0.15s;
}
.service-card:hover { background:var(--bg-hover); }
.service-card.selected { border-color:var(--accent); background:var(--accent-light); }
.service-card.selected-full { border-color:var(--accent2); background:var(--accent2-light); }

/* ── Payment Buttons ── */
.pay-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.pay-btn {
  padding:10px 8px; border-radius:var(--radius); border:1px solid var(--border);
  background:var(--bg-card); color:var(--text-secondary); font-size:11px; font-weight:500;
  text-align:center; display:flex; align-items:center; justify-content:center; gap:5px;
  transition:0.15s;
}
.pay-btn:hover { background:var(--bg-hover); color:var(--text-primary); border-color:var(--accent); }
.pay-btn:disabled { opacity:0.35; cursor:not-allowed; }

/* ── Form ── */
.form-group { margin-bottom:14px; }
.form-label { font-size:11px; font-weight:600; color:var(--text-label); margin-bottom:4px; display:block; }
.form-input {
  width:100%; padding:8px 12px; border-radius:var(--radius); border:1px solid var(--border);
  background:var(--bg-input); color:var(--text-primary); font-size:13px; outline:none;
  transition:border-color 0.15s;
}
.form-input:focus { border-color:var(--accent); }
.form-select { appearance:none; background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239a9cae' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat:no-repeat; background-position:right 8px center; background-size:14px; padding-right:30px; }

/* ── Button Primary ── */
.btn-primary {
  padding:10px 20px; border-radius:var(--radius); border:none; font-weight:700;
  font-size:13px; color:#fff; transition:0.15s;
}
.btn-sm { padding:7px 14px; font-size:11px; }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--text-secondary); }
.btn-outline:hover { background:var(--bg-hover); color:var(--text-primary); }

/* ── Toast ── */
.toast-container { position:fixed; top:16px; right:16px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
.toast {
  padding:14px 18px; border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); max-width:380px;
  animation: slideIn 0.3s ease-out; font-size:12px; border-left:4px solid;
  background:var(--bg-card); color:var(--text-primary);
}
.toast.emergency { border-left-color:var(--red); background:#fef2f2; }
[data-theme="dark"] .toast.emergency { background:#1c1012; }
.toast.success { border-left-color:var(--green); }
.toast .toast-title { font-weight:700; font-size:13px; margin-bottom:2px; }
.toast .toast-sub { color:var(--text-secondary); }

@keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
@keyframes pinShake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }

/* ── PIN Pad ── */
.pin-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:9998; }
.pin-box { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:32px 28px; width:300px; box-shadow:var(--shadow-lg); text-align:center; }
.pin-dots { display:flex; justify-content:center; gap:12px; margin:20px 0; }
.pin-dot { width:14px; height:14px; border-radius:50%; border:2px solid var(--border); background:transparent; transition:0.15s; }
.pin-dot.filled { background:var(--accent); border-color:var(--accent); }
.pin-numpad { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:16px; }
.pin-key {
  padding:14px 0; border-radius:var(--radius); border:1px solid var(--border); background:var(--bg-card);
  color:var(--text-primary); font-size:20px; font-weight:700; cursor:pointer; transition:0.1s;
  -webkit-tap-highlight-color:transparent; user-select:none;
}
.pin-key:active { background:var(--accent-light); border-color:var(--accent); transform:scale(0.95); }
.pin-key.fn { font-size:13px; font-weight:600; color:var(--text-muted); }

/* ── Emergency Modal ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center;
  justify-content:center; z-index:9998;
}
.modal {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:28px; width:420px; box-shadow:var(--shadow-lg);
}
.modal h3 { font-size:16px; font-weight:700; margin-bottom:4px; }
.modal p { font-size:12px; color:var(--text-secondary); margin-bottom:16px; }

/* ── Config Upload ── */
.upload-zone {
  width:80px; height:80px; border-radius:50%; border:2px dashed var(--border);
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  background:var(--bg-input); transition:0.15s; overflow:hidden; flex-shrink:0;
}
.upload-zone:hover { border-color:var(--accent); }
.upload-zone img { width:100%; height:100%; object-fit:cover; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* ── Currency Selector ── */
.curr-btn {
  padding:4px 10px; border-radius:6px; border:1px solid var(--border); background:var(--bg-card);
  font-size:11px; font-weight:600; color:var(--text-secondary); cursor:pointer; transition:0.15s;
}
.curr-btn.active { background:var(--accent-light); color:var(--accent); border-color:var(--accent-border); }
.curr-btn.active-full { background:var(--accent2-light); color:var(--accent2); border-color:var(--accent2-border); }

/* Contact icons */
.contact-icon {
  width:28px; height:28px; border-radius:50%; display:inline-flex; align-items:center;
  justify-content:center; font-size:14px; cursor:pointer; transition:0.15s; border:1px solid var(--border);
  background:var(--bg-card); text-decoration:none;
}
.contact-icon:hover { transform:scale(1.1); }
.contact-icon.wa { color:#25d366; border-color:#25d366; }
.contact-icon.tg { color:#0088cc; border-color:#0088cc; }
</style>
</head>

function addToast(title, sub, type='success') {
  const id = Date.now();
  state.toasts.push({id, title, sub, type});
  render();
  setTimeout(() => { state.toasts = state.toasts.filter(t=>t.id!==id); render(); }, 6000);
}

//  TIMER LOGIC
// ═══════════════════════════════════════════════════════
setInterval(() => {
  let changed = false;
  state.timers.forEach(timer => {
    if (timer.remaining > 0) {
      timer.remaining--;
      changed = true;
      if (timer.remaining === 0) {
        // Update worker status back to available using stored branchId
        const workers = BRANCH_WORKERS[timer.branchId || state.branch.id];
        if (workers) {
          const w = workers.find(wk => wk.id === timer.workerId);
          if (w) w.status = 'available';
        }
        addToast('⏱️ Session Ended', `${timer.roomName} — ${timer.workerName} is now available`, 'success');
      }
    }
  });
  if (changed) render();
}, 1000);

document.addEventListener('keydown', e => {
  keyBuffer += e.key;
  if (keyBuffer.length > 10) keyBuffer = keyBuffer.slice(-10);
  if (keyBuffer.includes('6969')) {
    state.unlocked = !state.unlocked;
    keyBuffer = '';
    render();
  }
});

// Secret code — touch: tap brand logo 4x to show PIN pad
let brandTapCount = 0;
let brandTapTimer = null;
document.addEventListener('click', e => {
  const brand = e.target.closest('.sidebar-brand');
  if (!brand) return;
  brandTapCount++;
  clearTimeout(brandTapTimer);
  brandTapTimer = setTimeout(() => { brandTapCount = 0; }, 1200);
  if (brandTapCount >= 4) {
    brandTapCount = 0;
    state.modal = 'pin-unlock';
    state.pinInput = '';
    render();
  }
});

function pinPress(digit) {
  state.pinInput = (state.pinInput || '') + digit;
  render();
  if (state.pinInput === '6969') {
    state.unlocked = !state.unlocked;
    state.modal = null;
    state.pinInput = '';
    render();
  } else if (state.pinInput.length >= 4) {
    // Wrong code — shake & reset
    const dots = document.getElementById('pin-dots');
    if (dots) { dots.style.animation = 'none'; dots.offsetHeight; dots.style.animation = 'pinShake 0.4s ease'; }
    setTimeout(() => { state.pinInput = ''; render(); }, 400);
  }
}
function pinBack() { state.pinInput = (state.pinInput || '').slice(0, -1); render(); }
function pinCancel() { state.modal = null; state.pinInput = ''; render(); }

          <a class="contact-icon tg" href="https://t.me/${state.branch.tg}" target="_blank" title="Telegram">✈️</a>
          <!-- Active timers indicator -->
          ${state.timers.filter(t=>t.remaining>0).length > 0 ? `
            <span style="font-size:11px;color:var(--orange);font-weight:600;cursor:pointer;" onclick="setPage('rooms')">
              ⏱️ ${state.timers.filter(t=>t.remaining>0).length} active
            </span>
          ` : ''}
          <span style="font-size:12px;color:var(--text-muted);">${new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}</span>
          <span style="font-size:14px;font-weight:700;">${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
        </div>
      </div>

      <!-- CONTENT -->
      <div class="content">
        ${renderPage(workers, rooms, services, ul, ac)}
      </div>
    </div>

    <!-- TOASTS -->
    <div class="toast-container">
      ${state.toasts.map(toast => `
        <div class="toast ${toast.type}">
          <div class="toast-title">${toast.title}</div>
          <div class="toast-sub">${toast.sub}</div>
        </div>
      `).join('')}
    </div>

    <!-- MODAL -->
    ${state.modal ? renderModal() : ''}
  `;
}

function renderPage(workers, rooms, services, ul, ac) {
  switch(state.page) {
    case 'floor': return renderFloor(workers, rooms, ul, ac);
    case 'workers': return renderWorkers(workers, ul, ac);
    case 'rooms': return renderRooms(rooms, ul);
    case 'collections': return renderCollections(ul);
    case 'transactions': return renderTransactions();
    case 'ghl': return renderGHL();
    case 'new-order': return renderNewOrder(workers, rooms, services, ul, ac);
    case 'config': return renderConfig(ul);
    case 'booking': return renderBooking();
    default: return '';
  }
}

        <div class="service-grid" style="margin-bottom:20px;">

            return `

                <div>
                  <div style="font-weight:600;font-size:13px;">${s.name}</div>
                  <div style="font-size:10px;color:var(--text-muted);">${s.dur} ${t('min')} ${ul&&s.code?'· '+s.code:''}</div>
                </div>
                <div style="font-weight:700;color:${ul?'var(--accent2)':'var(--accent)'};">${fc(s.price)}</div>
              </div>
            `;
          }).join('')}
        </div>

        <!-- Rooms -->
        <div class="section-title">${state.selectedRoom?'✅':'⬜'} ${t('step3')}</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
          ${rooms.map(r=>{
            const occ = state.timers.find(tm=>tm.roomId===r.id&&tm.remaining>0);
            return `
              <div class="worker-card ${state.selectedRoom?.id===r.id?'selected'+ac:''}" onclick="${occ?'':`pickRoom('${r.id}')`}" style="text-align:center;opacity:${occ?0.4:1};cursor:${occ?'not-allowed':'pointer'};">
                <div style="font-weight:700;font-size:14px;">${r.name}</div>
                <div style="font-size:10px;color:var(--text-muted);">${r.type}</div>
                ${occ?`<div style="font-size:10px;color:var(--red);margin-top:4px;">${t('occupied')}</div>`:''}
              </div>
            `;
          }).join('')}
        </div>
      </div>

      <!-- Summary Sidebar -->
      <div class="card" style="height:fit-content;position:sticky;top:20px;">
        <div style="font-weight:700;font-size:14px;margin-bottom:16px;">${t('orderSummary')}</div>
        <div style="margin-bottom:14px;">
          <div class="form-label">${ul?t('workersFull'):t('workers')}</div>
          ${state.selectedWorker?`
            <div style="display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg-input);border-radius:var(--radius);">
              <div class="worker-avatar" style="width:28px;height:28px;font-size:14px;margin:0;">${state.workerPhotos[state.selectedWorker.id]?`<img src="${state.workerPhotos[state.selectedWorker.id]}">`:'👤'}</div>
              <div><div style="font-weight:600;font-size:12px;">${state.selectedWorker.name}</div></div>
            </div>
          `:`<div style="font-size:12px;color:var(--text-muted);font-style:italic;">${t('notSelected')}</div>`}
        </div>
        <div style="margin-bottom:14px;">
          <div class="form-label">${t('room')}</div>
          ${state.selectedRoom?`<div style="padding:8px;background:var(--bg-input);border-radius:var(--radius);font-size:12px;font-weight:600;">${state.selectedRoom.name} — ${state.selectedRoom.type}</div>`
          :`<div style="font-size:12px;color:var(--text-muted);font-style:italic;">${t('notSelected')}</div>`}
        </div>
        <div style="margin-bottom:14px;">
          <div class="form-label">${t('service')}</div>
          ${state.selectedServices.length===0?`<div style="font-size:12px;color:var(--text-muted);font-style:italic;">${t('noneSelected')}</div>`:
          state.selectedServices.map(s=>`
            <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border-light);font-size:12px;">
              <span>${s.name}</span><span style="font-weight:600;color:${ul?'var(--accent2)':'var(--accent)'};">${fc(s.price)}</span>
            </div>
          `).join('')}
        </div>
        <div style="border-top:2px solid var(--border);padding-top:12px;margin-top:8px;">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-bottom:4px;">
            <span>${t('duration')}</span><span>${dur} ${t('min')}</span>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:18px;font-weight:800;">
            <span>${t('total')}</span><span style="color:${ul?'var(--accent2)':'var(--accent)'};">${fc(total)}</span>
          </div>
        </div>
        <div style="margin-top:16px;">
          <div class="form-label">${t('payWith')}</div>
          ${(()=>{
            const missing = [];
            if (!state.selectedWorker) missing.push(ul?t('workersFull'):t('workers'));
            if (state.selectedServices.length===0) missing.push(t('service'));
            if (!state.selectedRoom) missing.push(t('room'));
            const canPay = missing.length===0;
            return (missing.length>0?'<div style="padding:8px 12px;border-radius:var(--radius);background:var(--red-light);color:var(--red);font-size:11px;font-weight:600;margin-bottom:8px;">⚠️ Select: '+missing.join(', ')+'</div>':'')+
              '<div class="pay-grid">'+
              payMethods.map(pm=>'<button class="pay-btn" '+(canPay?'':'disabled')+' onclick="checkout(\''+pm.id+'\')">'+pm.i+' '+pm.n+'</button>').join('')+
              '</div>';
          })()}
        </div>
      </div>
    </div>
  `;
}

// ── EMERGENCY MODAL ──
function renderModal() {
  if (state.modal === 'pin-unlock') {
    const len = (state.pinInput || '').length;
    return `
      <div class="pin-overlay" onclick="pinCancel()">
        <div class="pin-box" onclick="event.stopPropagation()">
          <div style="font-size:13px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">Enter PIN</div>
          <div class="pin-dots" id="pin-dots">
            ${[0,1,2,3].map(i=>`<div class="pin-dot ${i<len?'filled':''}"></div>`).join('')}
          </div>
          <div class="pin-numpad">
            ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" onclick="pinPress('${n}')">${n}</button>`).join('')}
            <button class="pin-key fn" onclick="pinCancel()">✕</button>
            <button class="pin-key" onclick="pinPress('0')">0</button>
            <button class="pin-key fn" onclick="pinBack()">⌫</button>
          </div>
        </div>
      </div>
    `;
  }
  if (state.modal === 'emergency') {
    const types = [
      {k:'fight',l:t('fight')},{k:'police',l:t('police')},{k:'medical',l:t('medical')},
      {k:'fire',l:t('fire')},{k:'suspicious',l:t('suspicious')},{k:'other',l:t('other')},
    ];
    return `
      <div class="modal-overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
          <h3 style="color:var(--red);">${t('emergencyTitle')}</h3>
          <p>${t('emergencyDesc')}</p>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">
            ${types.map(tp=>`
              <button class="pay-btn" style="padding:12px;font-size:12px;font-weight:600;${state.emergencyType===tp.k?'border-color:var(--red);background:var(--red-light);color:var(--red);':''}" onclick="state.emergencyType='${tp.k}';render();">
                ${tp.l}
              </button>
            `).join('')}
          </div>
          <div class="form-group">
            <label class="form-label">Remarks (optional)</label>
            <textarea class="form-input" id="emergency-remarks" rows="2" placeholder="Additional details..."></textarea>
          </div>
          <div style="display:flex;gap:8px;justify-content:flex-end;">
            <button class="btn-sm btn-outline" onclick="closeModal()">${t('cancel')}</button>
            <button class="btn-primary btn-sm" style="background:var(--red);" onclick="confirmEmergency()" ${!state.emergencyType?'disabled':''}>${t('send')}</button>
          </div>
        </div>
      </div>
    `;
  }
  if (state.modal === 'emergency-confirm') {
    return `
      <div class="modal-overlay">
        <div class="modal" onclick="event.stopPropagation()">
          <h3 style="color:var(--red);">⚠️ ${t('emergencyConfirm')}</h3>
          <p>Type <strong>CONFIRM</strong> or enter your PIN to proceed.</p>
          <div class="form-group">
            <input class="form-input" id="confirm-code" placeholder="${t('enterCode')}" style="font-size:16px;text-align:center;font-weight:700;letter-spacing:4px;" oninput="checkEmergencyCode(this.value)">
          </div>
          <div style="display:flex;gap:8px;justify-content:flex-end;">
            <button class="btn-sm btn-outline" onclick="closeModal()">${t('cancel')}</button>
          </div>
        </div>
      </div>
    `;
  }
  return '';
}

// ═══════════════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════════════
function setBranch(id) { state.branch = BRANCHES.find(b=>b.id===id); state.selectedWorker=null; state.selectedRoom=null; state.selectedServices=[]; render(); }
function setPage(p) { state.page=p; render(); }
function setCurr(c) { state.currency=c; render(); }
function setTheme(th) { state.theme=th; render(); }
function setLang(l) { state.lang=l; render(); }

function startNewOrder() { state.selectedWorker=null; state.selectedRoom=null; state.selectedServices=[]; state.page='new-order'; render(); }

function selectWorkerAndOrder(id) {
  const w = getWorkers().find(wk=>wk.id===id);
  state.selectedWorker=w; state.selectedRoom=null; state.selectedServices=[]; state.page='new-order'; render();
}

function pickWorker(id) { state.selectedWorker = getWorkers().find(w=>w.id===id)||null; render(); }
function pickRoom(id) { state.selectedRoom = getRooms().find(r=>r.id===id)||null; render(); }
function toggleService(id) {
  const svcs = getServices();
  const s = svcs.find(sv=>sv.id===id);
  if (!s) return;
  const idx = state.selectedServices.findIndex(sv=>sv.id===id);
  if (idx>=0) state.selectedServices.splice(idx,1); else state.selectedServices.push(s);
  render();
}

function checkout(methodId) {
  // Require all 3: worker, service(s), room
  if (!state.selectedWorker || state.selectedServices.length===0 || !state.selectedRoom) {
    const missing = [];
    if (!state.selectedWorker) missing.push(state.unlocked ? t('workersFull') : t('workers'));
    if (state.selectedServices.length===0) missing.push(t('service'));
    if (!state.selectedRoom) missing.push(t('room'));
    addToast('⚠️ Missing Selection', 'Please select: ' + missing.join(', '), 'emergency');
    return;
  }
  const total = state.selectedServices.reduce((s,sv)=>s+sv.price,0);
  const dur = state.selectedServices.reduce((s,sv)=>s+sv.dur,0);
  const method = (PAYMENT_METHODS[state.currency]||PAYMENT_METHODS.MYR).find(m=>m.id===methodId);

  // Add transaction
  state.transactions.push({
    id: state.transactions.length+1,
    time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
    worker: state.selectedWorker.name,
    service: state.selectedServices.map(s=>s.name).join(', '),
    room: state.selectedRoom.id,
    amount: total,
    method: method?.n||methodId,
    status: 'completed',
  });

  // Update collections
  if (methodId==='cash') state.collections.cash+=total;
  else if (methodId==='card') state.collections.card+=total;
  else state.collections.ewallet+=total;

  // Set worker to busy
  const branchWorkers = BRANCH_WORKERS[state.branch.id];
  if (branchWorkers) {
    const w = branchWorkers.find(wk=>wk.id===state.selectedWorker.id);
    if (w) w.status = 'busy';
  }

  // Start room timer
  state.timers = state.timers.filter(tm=>tm.roomId!==state.selectedRoom.id);
  state.timers.push({
    roomId: state.selectedRoom.id,
    roomName: state.selectedRoom.name,
    workerName: state.selectedWorker.name,
    workerId: state.selectedWorker.id,
    branchId: state.branch.id,
    duration: dur*60,
    remaining: dur*60,
    startedAt: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
  });

  addToast('✓ Payment Confirmed', `${state.selectedWorker.name} → ${state.selectedRoom.name} · ${fc(total)} via ${method?.n||methodId}`, 'success');
  state.selectedWorker=null; state.selectedRoom=null; state.selectedServices=[];
  state.page='floor'; render();
}

function connectGHL() { state.ghlStatus='connecting'; render(); setTimeout(()=>{state.ghlStatus='connected';render();},1500); }
function testGHL() { state.ghlStatus='processing'; render(); setTimeout(()=>{state.ghlStatus='approved';render();},2000); setTimeout(()=>{state.ghlStatus='connected';render();},4000); }

function openEmergency() { state.modal='emergency'; state.emergencyType=null; render(); }
function closeModal() { state.modal=null; state.emergencyType=null; render(); }
function confirmEmergency() { state.modal='emergency-confirm'; render(); setTimeout(()=>{const el=document.getElementById('confirm-code');if(el)el.focus();},100); }

function checkEmergencyCode(val) {
  if (val.toUpperCase()==='CONFIRM' || val==='1234') {
    const remarks = document.getElementById('emergency-remarks')?.value || '';
    const typeLabels = {fight:t('fight'),police:t('police'),medical:t('medical'),fire:t('fire'),suspicious:t('suspicious'),other:t('other')};
    const typeLabel = typeLabels[state.emergencyType]||state.emergencyType;
    closeModal();
    // Send toast to simulate notification to all branches
    addToast(
      `🚨 ${t('alertSent')}`,
      `${t('alertFrom')} ${state.branch.name}: ${typeLabel}${remarks?' — '+remarks:''}`,
      'emergency'
    );
    // Simulate other branches seeing it
    setTimeout(()=>{
      addToast('🚨 Alert Acknowledged', `Bangsar HQ has seen the alert`, 'success');
    }, 3000);
  }
}

function uploadPhoto(workerId) { document.getElementById('photo-'+workerId)?.click(); }
function handlePhotoUpload(workerId, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => { state.workerPhotos[workerId] = e.target.result; render(); };
  reader.readAsDataURL(file);
}
function updateWorker(id, field, value) {
  for (const branchId in BRANCH_WORKERS) {
    const w = BRANCH_WORKERS[branchId].find(wk=>wk.id===id);
    if (w) { w[field] = field==='age'||field==='h'||field==='w' ? Number(value) : value; break; }
  }
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
render();
</script>
